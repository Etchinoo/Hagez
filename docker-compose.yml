version: '3.9'

# ============================================================
# SUPER RESERVATION PLATFORM — Local Development Stack
# Run: docker compose up -d
# ============================================================

services:

  # ── PostgreSQL 15 ────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: reservr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reservr_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/api/prisma/seed.sql:/docker-entrypoint-initdb.d/seed.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  # Shadow DB for Prisma migrations
  postgres_shadow:
    image: postgres:15-alpine
    container_name: reservr_postgres_shadow
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reservr_shadow
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis 7 ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: reservr_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  # ── API Server (Node.js / Fastify) ───────────────────────
  api:
    build:
      context: ./packages/api
      dockerfile: Dockerfile.dev
    container_name: reservr_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/reservr_dev
      DATABASE_SHADOW_URL: postgresql://postgres:postgres@postgres_shadow:5432/reservr_shadow
      REDIS_URL: redis://redis:6379
    ports:
      - '3000:3000'
    volumes:
      - ./packages/api:/app
      - /app/node_modules
    command: npm run dev

  # ── Business Dashboard (Next.js PWA) ────────────────────────
  dashboard:
    build:
      context: ./packages/dashboard
      dockerfile: Dockerfile.dev
    container_name: reservr_dashboard
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3000/v1
    ports:
      - '3001:3001'
    volumes:
      - ./packages/dashboard:/app
      - /app/node_modules
      - /app/.next

  # ── pgAdmin (DB GUI — dev only) ──────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: reservr_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: dev@reservr.eg
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres
    profiles:
      - tools   # Only starts with: docker compose --profile tools up

  # ── Redis Commander (Redis GUI — dev only) ───────────────
  redis_commander:
    image: rediscommander/redis-commander:latest
    container_name: reservr_redis_ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - '8081:8081'
    depends_on:
      - redis
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
