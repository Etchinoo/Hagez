services:
  redis:
    image: redis:7-alpine
    container_name: hagez-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - edge

  api:
    image: ghcr.io/etchinoo/hagez-api:latest
    container_name: hagez-api
    restart: unless-stopped
    env_file:
      - ./env/api.env
    expose:
      - "3000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - edge

  caddy:
    image: caddy:2-alpine
    container_name: hagez-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    networks:
      - edge

volumes:
  caddy_data:
  caddy_config:
  redis_data:

networks:
  edge:
    driver: bridge
